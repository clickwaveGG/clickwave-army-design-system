<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.btn-primary{display:inline-flex;align-items:center;gap:10px;background:#FF3300;color:#fff;padding:14px 26px;border-radius:9999px;font-family:var(--font-mono);font-size:14px;letter-spacing:1.6px;text-transform:uppercase;border:0;box-shadow:0 0 40px 0 rgba(255,87,34,.2);cursor:pointer}
.btn-primary:hover{background:#FF5722;box-shadow:0 0 30px 0 rgba(255,51,0,.35)}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;padding:12px 22px;border-radius:16px;font-family:var(--font-mono);font-size:11px;letter-spacing:1.1px;text-transform:uppercase;background:transparent;cursor:pointer}
.btn-ghost--purple{color:#7C3AED;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.3)}
.btn-ghost--cyan{color:#0EA5E9;background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.3)}
.btn-ghost--orange{color:#FF3300;background:rgba(255,51,0,.08);border:1px solid rgba(255,51,0,.3)}
.arrow{width:14px;height:14px}
</style></head><body>
<button class="btn-primary">COMEÇAR AGORA <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
<button class="btn-ghost btn-ghost--purple">VER DESIGN</button>
<button class="btn-ghost btn-ghost--cyan">VER VÍDEO</button>
<button class="btn-ghost btn-ghost--orange">VER TRÁFEGO</button>
</body></html>
