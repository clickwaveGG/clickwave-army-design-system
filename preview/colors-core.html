<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Colors — Core</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border:1px solid var(--color-border-default);border-radius:12px;overflow:hidden;background:var(--color-surface-0);}
  .chip{height:72px;}
  .meta{padding:10px 12px;}
  .name{font-family:var(--font-mono);font-size:11px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3);}
  .hex{font-family:var(--font-mono);font-size:12px;color:var(--fg1);margin-top:2px;}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#0A0A0A;border-bottom:1px solid var(--color-border-default)"></div><div class="meta"><div class="name">brand-black</div><div class="hex">#0A0A0A</div></div></div>
  <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="meta"><div class="name">brand-gray</div><div class="hex">#1F1F1F</div></div></div>
  <div class="sw"><div class="chip" style="background:#FF3300"></div><div class="meta"><div class="name">brand-orange</div><div class="hex">#FF3300</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">white</div><div class="hex">#FFFFFF</div></div></div>
</div></body></html>
