<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Colors — Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .sw{border:1px solid var(--color-border-default);border-radius:12px;overflow:hidden;background:var(--color-surface-0);}
  .chip{height:80px;display:flex;align-items:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.35px;color:rgba(255,255,255,.85)}
  .meta{padding:10px 12px;border-top:1px solid var(--color-border-subtle)}
  .name{font-family:var(--font-mono);font-size:11px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3);}
  .hex{font-family:var(--font-mono);font-size:12px;color:var(--fg1);margin-top:2px;}
  .use{font-family:var(--font-mono);font-size:10px;color:var(--fg4);text-transform:uppercase;margin-top:4px;letter-spacing:.35px;}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#7C3AED">// WEB DESIGN</div><div class="meta"><div class="name">accent-purple</div><div class="hex">#7C3AED</div><div class="use">design de impacto</div></div></div>
  <div class="sw"><div class="chip" style="background:#0EA5E9">// VÍDEO</div><div class="meta"><div class="name">accent-cyan</div><div class="hex">#0EA5E9</div><div class="use">vídeo & conteúdo</div></div></div>
  <div class="sw"><div class="chip" style="background:#10B981">// ATIVO</div><div class="meta"><div class="name">accent-green</div><div class="hex">#10B981</div><div class="use">status confirmado</div></div></div>
</div></body></html>
