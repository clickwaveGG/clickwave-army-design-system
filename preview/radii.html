<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px;display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);aspect-ratio:1.3/1;display:flex;align-items:flex-end;padding:10px}
.lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3)}
.px{color:var(--fg4);display:block;margin-top:2px}
</style></head><body>
<div class="box" style="border-radius:4px"><div class="lab">xs<span class="px">4px</span></div></div>
<div class="box" style="border-radius:8px"><div class="lab">sm<span class="px">8px</span></div></div>
<div class="box" style="border-radius:16px"><div class="lab">md<span class="px">16px</span></div></div>
<div class="box" style="border-radius:32px"><div class="lab">xl<span class="px">32px</span></div></div>
<div class="box" style="border-radius:9999px"><div class="lab">full<span class="px">pill</span></div></div>
</body></html>
