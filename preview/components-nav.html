<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Nav Pill</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px 18px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9999px;backdrop-filter:blur(12px);box-shadow:0 10px 15px -3px rgba(0,0,0,.1)}
.left{display:flex;align-items:center;gap:10px}
.word{font-family:var(--font-display);font-style:italic;font-size:20px;color:#fff}
.links{display:flex;align-items:center;gap:22px;font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.9)}
.links .dot{opacity:.4}
.login{display:inline-flex;align-items:center;gap:8px;background:#FF3300;color:#fff;padding:8px 18px;border-radius:9999px;font-family:var(--font-sans);font-size:13px;box-shadow:0 0 40px 0 rgba(255,87,34,.2)}
</style></head><body>
<nav class="nav">
  <div class="left"><img src="../assets/clickwave-mark.svg" width="22" height="22" alt=""><span class="word">Clickwave</span></div>
  <div class="links"><span>Como Funciona</span><span class="dot">·</span><span>Serviços</span><span class="dot">·</span><span>Metodologia</span><span class="dot">·</span><span>Sobre nós</span></div>
  <a class="login">Login →</a>
</nav>
</body></html>
