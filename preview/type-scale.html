<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:18px 22px;font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3)}
table{border-collapse:collapse;width:100%}
td{padding:4px 10px 4px 0;vertical-align:baseline;border-bottom:1px solid var(--color-border-subtle)}
td.tok{width:60px;color:var(--fg3)}
td.px{width:55px;color:var(--fg4)}
td.sample{color:#fff;font-family:var(--font-sans);text-transform:none;letter-spacing:normal}
</style></head><body>
<table>
<tr><td class="tok">6xl</td><td class="px">72</td><td class="sample" style="font-size:72px;line-height:1;font-family:var(--font-display)">Ag</td></tr>
<tr><td class="tok">5xl</td><td class="px">60</td><td class="sample" style="font-size:60px;line-height:1;font-family:var(--font-display)">Guerra</td></tr>
<tr><td class="tok">3xl</td><td class="px">36</td><td class="sample" style="font-size:36px;line-height:1.1;font-family:var(--font-display)">Missão</td></tr>
<tr><td class="tok">xl</td><td class="px">24</td><td class="sample" style="font-size:24px;font-family:var(--font-display)">A Missão</td></tr>
<tr><td class="tok">base</td><td class="px">16</td><td class="sample" style="font-size:16px">Body copy padrão</td></tr>
<tr><td class="tok">sm</td><td class="px">14</td><td class="sample" style="font-size:14px">Nav · body pequeno</td></tr>
<tr><td class="tok">xs</td><td class="px">12</td><td class="sample" style="font-size:12px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.35px">// LABEL MONO</td></tr>
</table>
</body></html>
