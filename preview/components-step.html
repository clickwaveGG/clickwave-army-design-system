<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Step Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.step{padding:22px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(24px)}
.step:hover{border-color:rgba(255,51,0,.3);background:rgba(255,255,255,.05)}
.n{font-family:var(--font-mono);font-size:11px;letter-spacing:.35px;text-transform:uppercase;color:rgba(255,51,0,.6);margin-bottom:10px;display:block}
h3{font-family:var(--font-display);font-weight:400;font-size:22px;margin:0 0 8px}
p{font-family:var(--font-sans);font-size:13px;line-height:1.55;color:var(--fg2);margin:0}
</style></head><body>
<div class="step"><span class="n">PASSO 01</span><h3>A Oferta Irresistível</h3><p>Aumentamos o valor percebido. O mercado obedece.</p></div>
<div class="step"><span class="n">PASSO 02</span><h3>Artilharia de Tráfego</h3><p>Incursões cirúrgicas. Zero desperdício.</p></div>
</body></html>
