<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Service Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{padding:18px;border-radius:32px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(24px);display:flex;flex-direction:column;gap:14px}
.card.p{border-color:rgba(124,58,237,.3)}
.card.c{border-color:rgba(14,165,233,.3)}
.card.o{border-color:rgba(255,51,0,.3);box-shadow:0 0 60px 0 rgba(255,51,0,.12)}
.lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3)}
h3{font-family:var(--font-display);font-weight:400;font-size:20px;margin:0;font-style:italic}
.btn{padding:10px 0;border-radius:16px;text-align:center;font-family:var(--font-mono);font-size:10px;letter-spacing:1.1px;text-transform:uppercase}
.btn.p{color:#7C3AED;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.3)}
.btn.c{color:#0EA5E9;background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.3)}
.btn.o{color:#FF3300;background:rgba(255,51,0,.08);border:1px solid rgba(255,51,0,.3)}
.star{font-family:var(--font-mono);font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:#FF3300}
</style></head><body>
<article class="card p"><span class="lab">// Serviço 01</span><h3>Design de Impacto</h3><span class="btn p">Ver Arsenal</span></article>
<article class="card o"><span class="star">★ Recomendado</span><h3>Tráfego de Elite</h3><span class="btn o">Ver Arsenal</span></article>
<article class="card c"><span class="lab">// Serviço 03</span><h3>Vídeo & Conteúdo</h3><span class="btn c">Ver Arsenal</span></article>
</body></html>
