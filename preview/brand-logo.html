<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Brand Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center}
.block{display:flex;flex-direction:column;gap:12px}
.frame{background:rgba(255,255,255,.03);border:1px solid var(--color-border-default);border-radius:16px;padding:22px;display:flex;align-items:center;justify-content:center;min-height:84px}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3)}
.word{font-family:var(--font-display);font-style:italic;font-size:28px;color:#fff}
.mark-row{display:flex;align-items:center;gap:10px}
</style></head><body>
<div class="block">
  <div class="frame"><img src="../assets/clickwave-mark.svg" width="44" height="44" alt=""></div>
  <div class="meta">clickwave mark · orange #FF3300 · 44px</div>
</div>
<div class="block">
  <div class="frame"><div class="mark-row"><img src="../assets/clickwave-mark.svg" width="28" height="28" alt=""><span class="word">Clickwave</span></div></div>
  <div class="meta">lockup · mark + playfair italic</div>
</div>
</body></html>
