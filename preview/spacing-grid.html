<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:20px 24px;font-family:var(--font-mono);font-size:11px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3)}
.row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.tok{width:48px;color:var(--fg3)}
.px{width:46px;color:var(--fg4)}
.bar{height:14px;background:#FF3300;border-radius:2px}
</style></head><body>
<div class="row"><span class="tok">1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="tok">2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="tok">4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="tok">6</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="tok">8</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="tok">12</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="tok">16</span><span class="px">64</span><span class="bar" style="width:64px"></span></div>
<div class="row"><span class="tok">24</span><span class="px">96</span><span class="bar" style="width:96px"></span></div>
<div class="row"><span class="tok">32</span><span class="px">128</span><span class="bar" style="width:128px"></span></div>
</body></html>
