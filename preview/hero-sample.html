<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Hero Sample</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;font-family:var(--font-sans)}
.hero{position:relative;height:380px;overflow:hidden;background:#0A0A0A}
.bg{position:absolute;inset:0;background:url('../assets/hero-soldier.jpg') center/cover no-repeat;opacity:.9}
.ov1{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.75) 0%,rgba(0,0,0,.3) 60%,transparent 100%)}
.ov2{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.5),transparent 40%)}
.c{position:relative;z-index:2;padding:30px 36px;max-width:560px;display:flex;flex-direction:column;gap:16px}
.lab{font-family:var(--font-mono);font-size:11px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3)}
.h1{font-family:var(--font-display);font-size:62px;line-height:1;letter-spacing:-1.5px;margin:0}
.h1 em{font-style:italic}
.sub{font-family:var(--font-mono);font-size:12px;line-height:1.65;letter-spacing:.35px;text-transform:uppercase;color:var(--fg2);border-left:2px solid #FF3300;padding-left:14px}
.cta{align-self:flex-start;display:inline-flex;align-items:center;gap:10px;background:#FF3300;padding:14px 26px;border-radius:9999px;color:#fff;font-family:var(--font-mono);font-size:14px;letter-spacing:1.6px;text-transform:uppercase;box-shadow:0 0 40px 0 rgba(255,87,34,.2)}
</style></head><body>
<section class="hero">
  <div class="bg"></div><div class="ov1"></div><div class="ov2"></div>
  <div class="c">
    <span class="lab">// PROTOCOLO CLICKWAVE-01</span>
    <h1 class="h1">Marketing é <em>guerra.</em></h1>
    <p class="sub">// E nós somos a sua linha de frente. Estratégia implacável, clareza de marca e execução tática.</p>
    <a class="cta">COMEÇAR AGORA!</a>
  </div>
</section>
</body></html>
