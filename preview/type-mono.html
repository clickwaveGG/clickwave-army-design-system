<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:20px 24px;}
.block{margin-bottom:14px}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg4);margin-top:4px}
.cta{display:inline-flex;align-items:center;gap:10px;background:#FF3300;padding:14px 26px;border-radius:9999px;color:#fff;font-family:var(--font-mono);font-size:16px;letter-spacing:1.6px;text-transform:uppercase}
</style></head><body>
<div class="block"><span class="type-label">// PROTOCOLO: CLICKWAVE-01</span>
<div class="meta">label · jetbrains mono 12px · tracking .35px · fg3 (white/60)</div></div>
<div class="block"><span class="type-label" style="font-size:14px;color:var(--fg2)">OBJETIVO PRIMÁRIO · STATUS DA OPERAÇÃO · CAPACIDADE: 100%</span>
<div class="meta">label strong · mono 14px · white/70</div></div>
<div class="block"><span class="cta">COMEÇAR AGORA!</span>
<div class="meta">cta · mono 16px uppercase · tracking 1.6px</div></div>
</body></html>
