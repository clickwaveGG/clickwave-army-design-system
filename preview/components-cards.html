<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Cards — Glass</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:#0A0A0A;color:#fff;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:22px;position:relative}
.card.featured{border-color:rgba(255,51,0,.3);box-shadow:0 0 60px 0 rgba(255,51,0,.12),inset 0 1px 0 rgba(255,51,0,.2)}
h3{font-family:var(--font-display);font-weight:400;font-size:22px;margin:0 0 6px;font-style:italic}
p{font-family:var(--font-sans);font-size:14px;color:var(--fg2);margin:0;line-height:1.55}
.lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--color-action-dim);margin-bottom:4px;display:block}
.star{font-family:var(--font-mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:#FF3300;position:absolute;top:18px;right:22px}
.dot{position:absolute;top:22px;right:22px;width:8px;height:8px;border-radius:50%;background:#FF3300;box-shadow:0 0 10px 2px rgba(255,51,0,.6)}
</style></head><body>
<article class="card">
  <span class="dot"></span>
  <span class="lab">Objetivo primário</span>
  <h3>A Missão</h3>
  <p>Aniquilar a invisibilidade da sua marca e estabelecer dominância absoluta no seu nicho.</p>
</article>
<article class="card featured">
  <span class="star">★ Recomendado</span>
  <span class="lab">Operação completa</span>
  <h3>Arsenal completo</h3>
  <p>Tráfego · copy · design · inteligência de dados. Linha de frente unificada.</p>
</article>
</body></html>
