<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Orange Scales</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{border:1px solid var(--color-border-default);border-radius:10px;padding:12px;min-height:100px;display:flex;flex-direction:column;justify-content:space-between}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3);}
  .use{font-family:var(--font-sans);font-size:11px;color:var(--fg2);margin-top:4px;line-height:1.4}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:#FF3300"><div class="name" style="color:#fff">orange</div><div class="use" style="color:rgba(255,255,255,.9)">CTA, mark, urgência</div></div>
  <div class="sw" style="background:rgba(255,51,0,.60)"><div class="name">orange/60</div><div class="use">hover dim text</div></div>
  <div class="sw" style="background:rgba(255,51,0,.35)"><div class="name">orange/35</div><div class="use">glow sombra ativa</div></div>
  <div class="sw" style="background:rgba(255,51,0,.30)"><div class="name">orange/30</div><div class="use">border ghost, featured</div></div>
  <div class="sw" style="background:rgba(255,51,0,.12)"><div class="name">orange/12</div><div class="use">ambient shadow CTA</div></div>
</div></body></html>
