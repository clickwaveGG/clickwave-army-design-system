<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Colors — Whites</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0A0A0A;color:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px;}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
  .sw{border:1px solid var(--color-border-default);border-radius:8px;padding:10px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between}
  .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.35px;text-transform:uppercase;color:var(--fg3);}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--fg1);}
</style></head>
<body><div class="wrap"><div class="row">
  <div class="sw" style="background:rgba(255,255,255,.90)"><div class="name" style="color:#111">white/90</div><div class="val" style="color:#111">0.90</div></div>
  <div class="sw" style="background:rgba(255,255,255,.70)"><div class="name" style="color:#111">white/70</div><div class="val" style="color:#111">0.70</div></div>
  <div class="sw" style="background:rgba(255,255,255,.60)"><div class="name" style="color:#111">white/60</div><div class="val" style="color:#111">0.60</div></div>
  <div class="sw" style="background:rgba(255,255,255,.40)"><div class="name">white/40</div><div class="val">0.40</div></div>
  <div class="sw" style="background:rgba(255,255,255,.20)"><div class="name">white/20</div><div class="val">0.20</div></div>
  <div class="sw" style="background:rgba(255,255,255,.10)"><div class="name">white/10</div><div class="val">0.10</div></div>
  <div class="sw" style="background:rgba(255,255,255,.05)"><div class="name">white/5</div><div class="val">0.05</div></div>
  <div class="sw" style="background:rgba(255,255,255,.03)"><div class="name">white/3</div><div class="val">0.03</div></div>
</div></div></body></html>
