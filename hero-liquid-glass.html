<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClickWave Army — Variações do Hero</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  iframe{display:block;width:100%;height:100%;border:0;background:#060606}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const Frame = ({src}) => <iframe src={src} loading="lazy" />;

const App = () => (
  <DesignCanvas>
    <DCSection id="heros" title="Hero — Página de Vendas + Portal" subtitle="3 direções sobre o mesmo sistema de liquid glass · ClickWave brand">
      <DCArtboard id="v1" label="V1 · Split (Sales + Features)" width={1440} height={900}>
        <Frame src="variations/v1-split.html" />
      </DCArtboard>
      <DCArtboard id="v2" label="V2 · Full-width (Foco em Vendas)" width={1440} height={900}>
        <Frame src="variations/v2-fullwidth.html" />
      </DCArtboard>
      <DCArtboard id="v3" label="V3 · Dual Portal (Cliente + Colaborador)" width={1440} height={900}>
        <Frame src="variations/v3-portal.html" />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
